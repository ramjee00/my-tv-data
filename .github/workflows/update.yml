name: Auto Update TV Channels

on:
  schedule:
    - cron: '0 */3 * * *'   # हर 3 घंटे में update
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Run fetch script
      run: node fetch.js

    - name: Commit and Push
      run: |
        git config --global user.name "auto-bot"
        git config --global user.email "bot@email.com"
        git add .
        git commit -m "Auto update channels" || echo "No changes"
        git push
